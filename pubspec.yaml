name: scanava_ai
description: Cassava Edibility Assessment using AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.3.5
  tflite_flutter: ^0.12.1
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    # Detection model used by camera + analyze flows.
    - assets/models/best_float32.tflite
    # Classifier on YOLO crop (export your MobileNetV3 TFLite as cassava_mobilenetv3.tflite).
    - assets/models/cassava_mobilenetv3.tflite
    - assets/models/cassava_labels.txt

    # Existing images
    - assets/images/l1.png
    - assets/images/l2.png
    - assets/images/l3.png
    - assets/images/gy1.jpeg
    - assets/images/gy2.png
    - assets/images/gy3.png
    - assets/images/r1.png
    - assets/images/r2.png
    - assets/images/r3.png